name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Smoke test (python)
        run: |
          cheapermac --version

      - name: Build binary
        run: |
          chmod +x scripts/make-binary
          ./scripts/make-binary

      - name: Smoke test (binary)
        run: |
          ./dist/cheapermac --version

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/cheapermac
          generate_release_notes: true
